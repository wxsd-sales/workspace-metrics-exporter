<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function initMomentumTheme() {
        const getHashTheme = () => {
          const raw = window.location.hash.startsWith("#")
            ? window.location.hash.slice(1)
            : window.location.hash;

          if (!raw) {
            return null;
          }

          const theme = new URLSearchParams(raw).get("theme");
          return theme === "light" || theme === "dark" ? theme : null;
        };

        const apply = () => {
          const forcedTheme = getHashTheme();
          const dark = forcedTheme
            ? forcedTheme === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          const root = document.documentElement;

          root.classList.remove(
            "mds-theme-stable-lightWebex",
            "mds-theme-stable-darkWebex",
          );
          root.classList.add(
            dark ? "mds-theme-stable-darkWebex" : "mds-theme-stable-lightWebex",
          );
          root.style.colorScheme = dark ? "dark" : "light";
        };

        apply();
        window
          .matchMedia("(prefers-color-scheme: dark)")
          .addEventListener("change", () => {
            if (!getHashTheme()) {
              apply();
            }
          });
      })();
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@momentum-design/icons@0.54.0/dist/data/MomentumFontIcons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@momentum-design/tokens@0.10.4/dist/css/theme/webex/light-stable.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@momentum-design/tokens@0.10.4/dist/css/theme/webex/dark-stable.css"
    />
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/@momentum-design/illustrations@0.3.0/dist/svg/people-headshot-wavy-hair-l-oneninetwo-default.svg"
      as="image"
      type="image/svg+xml"
    />
    <meta
      name="momentum-illustrations-cdn"
      content="https://cdn.jsdelivr.net/npm/@momentum-design/illustrations@0.3.0/dist/svg"
    />
    <title>Workspace Metrics Exporter</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__brand">
        <span class="app-header__product">Workspace Metrics Exporter</span>
      </div>
      <div class="app-header__actions">
        <button
              id="theme-select-button"
              class="secondary-button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span
                id="theme-select-current-icon"
                class="theme-select-current-icon"
                aria-hidden="true"
              ></span>
              <span id="theme-select-label">System</span>
              <span
                class="momentum-icon icon icon-arrow-triangle-down-filled"
                aria-hidden="true"
              ></span>
            </button>
            <div
              id="theme-select-menu"
              class="theme-select-menu"
              role="listbox"
              hidden
            >
              <button
                class="theme-select-option"
                type="button"
                role="option"
                data-theme-choice="system"
              >
                <span
                  class="icon icon-laptop-regular"
                  aria-hidden="true"
                ></span>
                <span>System</span>
              </button>
              <button
                class="theme-select-option"
                type="button"
                role="option"
                data-theme-choice="light"
              >
                <span
                  class="momentum-icon icon icon-brightness-high-filled"
                  aria-hidden="true"
                ></span>
                <span>Light</span>
              </button>
              <button
                class="theme-select-option"
                type="button"
                role="option"
                data-theme-choice="dark"
              >
                <span
                  class="momentum-icon icon icon-quiet-hours-presence-filled"
                  aria-hidden="true"
                ></span>
                <span>Dark</span>
              </button>
      </div>
    </header>

    <main class="app-main" aria-labelledby="pageTitle">
      <div class="app-content">
        <div class="page-stack" aria-live="polite">
          <section class="step-card" data-step="signin">
            <h2>Quick Manifest Generator</h2>
            <p>
              This web app will generate a manifest file for your workspace.
            </p>
            <form>
                <label for="displayName">Intregation Name:</label><br>
                <input type="text" id="displayName" name="displayName"><br>
                <label for="contactEmail">Contact Email:</label><br>
                <input type="email" id="contactEmail" name="contactEmail"><br>
                <label for="vendor">Vendor Name:</label><br>
                <input type="text" id="vendor" name="vendor"><br>
                <label for="description">Description:</label><br>
                <input type="textarea" id="description" name="description"><br>
              </form>

            <div class="step-actions">
              <button
                id="generateManifestBtn"
                type="button"
                class="icon-button icon-button--with-label secondary-button"
              >
                <span
                  class="icon icon-save-regular"
                  aria-hidden="true"
                ></span>
                <span class="icon-button__label">Generate Manifest</span>
              </button>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
